<!doctype html>
<notebook>
  <title>@robinl/my-flights: fe522555ef506fc9@514.js</title>

  <script id="1" type="application/vnd.observable.javascript">
    title = md`# ${diff_years(
      start_end_date[1],
      start_end_date[0]
    )} years of flights`
  </script>

  <script id="2" type="application/vnd.observable.javascript">
    md`A final version of this notebook can be viewed on my blog [here](https://www.robinlinacre.com/flights/).`
  </script>

  <script id="3" type="application/vnd.observable.javascript">
    blurb = md`Between ${format_date(start_end_date[0])} and ${format_date(
      start_end_date[1]
    )} I took ${routes.length} flights with and average distance of ${fmt_num(
      average_miles
    )} miles, and total milage of ${fmt_num(
      total_miles
    )}.  Total energy usage was around ${fmt_num_round(
      eu.flying.flying_miles_to_kwh(total_miles)
    )} kwh or ${fmt_num_round(tonnes_co2)} tonnes of co2.
    
    You can drag the globe below to rotate.`
  </script>

  <script id="4" type="application/vnd.observable.javascript">
    chart = {
    const context = DOM.context2d(width, height);
      const path = d3.geoPath(projection, context);
    
      function render() {
        context.clearRect(0, 0, width, height);
    
        context.beginPath(),
          path(sphere),
          (context.fillStyle = "#fff"),
          context.fill();
    
        context.beginPath(),
          path(land),
          (context.fillStyle = "#000"),
          context.fill();
    
        context.beginPath(), path(sphere), context.stroke();
    
        routes.forEach(function(d) {
          let coordinates = [
            [d["lng_from"], d["lat_from"]],
            [d["lng_to"], d["lat_to"]]
          ];
    
          let resampled = resample(coordinates);
    
          let mid_point_with_drift = [
            resampled["after"][1][0] + d["random"],
            resampled["after"][1][1] + d["random"]
          ];
    
          resampled["after"][1] = mid_point_with_drift;
    
          let route = {
            type: "LineString",
            coordinates: resampled["after"]
          };
          context.lineWidth = 1;
          context.lineO;
          context.beginPath(),
            path(route),
            (context.strokeStyle = colour_scale(d["date"])),
            context.stroke();
        });
    
        context.lineWidth = 1;
        context.strokeStyle = "#000000";
      }
    
      return d3
        .select(context.canvas)
        .call(drag(projection).on("drag.render", render))
        .call(render)
        .node();
    }
  </script>

  <script id="5" type="application/vnd.observable.javascript">
    projection = d3
      .geoOrthographic()
      .fitExtent([[1, 1], [width - 1, height - 1]], sphere)
      .translate([width / 2, height / 2])
      .rotate([0, -51])
      .precision(0.1)
  </script>

  <script id="6" type="application/vnd.observable.javascript">
    tonnes_co2 = kwh_to_kg_co2(eu.flying.flying_miles_to_kwh(total_miles)) / 1000
  </script>

  <script id="7" type="application/vnd.observable.javascript">
    kwh_to_kg_co2 = function(kwh) {
      return kwh * eu.convert.per("kg_co2_jet_fuel/kwh");
    }
  </script>

  <script id="8" type="application/vnd.observable.javascript">
    total_miles = d3.sum(routes, d => d["distance"])
  </script>

  <script id="9" type="application/vnd.observable.javascript">
    average_miles = d3.mean(routes, d => d["distance"])
  </script>

  <script id="10" type="application/vnd.observable.javascript">
    eu = require("@robinl/energy_usage@0.0.34")
  </script>

  <script id="11" type="application/vnd.observable.javascript">
    start_end_date = d3.extent(routes, d => d["date"])
  </script>

  <script id="12" type="application/vnd.observable.javascript">
    fmt_num = d3.format(",.0f")
  </script>

  <script id="13" type="application/vnd.observable.javascript">
    fmt_num_round = d3.format(",.2r")
  </script>

  <script id="14" type="application/vnd.observable.javascript">
    diff_years = function diff_years(dt2, dt1) {
      var diff = (dt2.getTime() - dt1.getTime()) / 1000;
      diff /= 60 * 60 * 24;
      return Math.abs(Math.round(diff / 365.25));
    }
  </script>

  <script id="15" type="application/vnd.observable.javascript">
    format_date = d => d.toISOString().split('T')[0]
  </script>

  <script id="16" type="application/vnd.observable.javascript">
    colour_scale = d3
      .scaleSequential(d3.interpolateOrRd)
      .domain(d3.extent(routes, d => d["date"]))
  </script>

  <script id="17" type="application/vnd.observable.javascript">
    resample = function resample(coordinates) {
      var i = 0,
        n = coordinates.length,
        before = [],
        after = [];
      while (++i < n) {
        var c0 = coordinates[i - 1].slice(),
          c1 = coordinates[i].slice(),
          p0 = projection(c0),
          p1 = projection(c1),
          x10 = p1[0] - p0[0],
          y10 = p1[1] - p0[1],
          d1 = x10 * x10 + y10 * y10;
        before.push(c0);
        after.push(c0);
        if (d1 > 4 * .1) {
          // linear distance check
          var c2 = d3.geoInterpolate(c0, c1)(.5),
            p2 = projection(c2),
            x20 = p2[0] - p0[0],
            y20 = p2[1] - p0[1],
            dz = y10 * x20 - x10 * y20;
          if ((dz * dz) / d1 > .1) {
            // perpendicular distance check
            var t = (x20 * x10 + y20 * y10) / d1;
            before.push(
              projection.invert((c2.resampled = [p0[0] + t * x10, p0[1] + t * y10]))
            );
            after.push(c2);
          }
        }
      }
      if (n) before.push(c1), after.push(c1);
      return { before: before, after: after };
    }
  </script>

  <script id="18" type="application/vnd.observable.javascript">
    drag = function drag(projection) {
      let v0, q0, r0;
      
      function dragstarted() {
        v0 = versor.cartesian(projection.invert(d3.mouse(this)));
        q0 = versor(r0 = projection.rotate());
      }
      
      function dragged() {
        const v1 = versor.cartesian(projection.rotate(r0).invert(d3.mouse(this)));
        const q1 = versor.multiply(q0, versor.delta(v0, v1));
        projection.rotate(versor.rotation(q1));
      }
      
      return d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged);
    }
  </script>

  <script id="19" type="application/vnd.observable.javascript">
    height = width
  </script>

  <script id="20" type="application/vnd.observable.javascript">
    sphere = ({type: "Sphere"})
  </script>

  <script id="21" type="application/vnd.observable.javascript">
    land = topojson.feature(world, world.objects.land)
  </script>

  <script id="22" type="application/vnd.observable.javascript">
    world = FileAttachment("world-110m.json").json()
  </script>

  <script id="23" type="application/vnd.observable.javascript">
    versor = require("versor@0.0.3")
  </script>

  <script id="24" type="application/vnd.observable.javascript">
    topojson = require("topojson-client@3")
  </script>

  <script id="25" type="application/vnd.observable.javascript">
    d3 = require("d3@5")
  </script>

  <script id="26" type="application/vnd.observable.javascript">
    routes_raw = d3.csv(await FileAttachment("my-flights.csv").url(), d3.autoType)
  </script>

  <script id="27" type="application/vnd.observable.javascript">
    routes = routes_raw.map(d => {
      d["random"] = ((Math.random() - 0.5) * d["distance"]) / 1000;
      return d;
    })
  </script>
</notebook>

  <script id="1" type="application/vnd.observable.javascript">

  </script>

  <script id="2" type="application/vnd.observable.javascript">
    rlju = require("@robinl/record_linkage_javascript_utilities@0.0.7")
  </script>

  <script id="3" type="application/vnd.observable.javascript">
    bf_to_pmw = rlju.convertMatchScoreMetrics.calcPartialMatchWeightFromBayesFactor
  </script>

  <script id="4" type="application/vnd.observable.javascript">
    prob_to_odds = function (p) {
      return rlju.convertMatchScoreMetrics.roundToSignificantFigures(
        p / (1 - p),
        8
      );
    }
  </script>

  <script id="5" type="application/vnd.observable.javascript">
    odds_to_prob = function odds_to_prob(odds) {
      return odds / (1 + odds);
    }
  </script>

  <script id="6" type="application/vnd.observable.javascript">
    pmw_to_bf = rlju.convertMatchScoreMetrics.calcBayesFactorFromPartialMatchWeight
  </script>

  <script id="7" type="application/vnd.observable.javascript">
    prior_probability_bound = bind2(
      Inputs.range([0, 1], {
        label: "Prior probability",
        value: 0.2,
        step: 0.01
      }),
      viewof prior_probability,
      (x) => x,
      (x) => x
    )
  </script>

  <script id="8" type="application/vnd.observable.javascript">
    prior_odds_bound = bind2(
      Inputs.number([0, prob_to_odds(0.999)], {
        label: "Equivalent prior odds",
        value: prob_to_odds(0.2)
      }),
      viewof prior_probability,
    
      prob_to_odds,
      odds_to_prob
    )
  </script>

  <script id="9" type="application/vnd.observable.javascript">
    partial_match_weight_bound = bind2(
      Inputs.range([-10, 10], {
        label: "Partial match weight",
        value: 2
      }),
      viewof partial_match_weight,
      (x) => x,
      (x) => x
    )
  </script>

  <script id="10" type="application/vnd.observable.javascript">
    bayes_factor = bind2(
      Inputs.number([pmw_to_bf(-10), pmw_to_bf(10)], {
        label: "Equivalent Bayes Factor",
        value: 2
      }),
      viewof partial_match_weight,
    
      pow2,
      log2
    )
  </script>

  <script id="11" type="application/vnd.observable.javascript">
    narrative = {
    let c = rlju.convertMatchScoreMetrics;
      let sf = 4;
    
      let prior_fmt = c.roundToSignificantFigures(prior_probability, sf);
    
      let pmw_fmt = c.roundToSignificantFigures(partial_match_weight, sf);
    
      let bf_fmt = c.roundToSignificantFigures(bayes_factor.value, sf);
    
      function formatBayesFactor(bf) {
        if (bf > 1) {
          let formattedBF = c.roundToSignificantFigures(bf, sf);
          return `${formattedBF} times more likely`;
        } else {
          let formattedBF = c.roundToSignificantFigures(1 / bf, sf);
          return `${formattedBF} times less likely`;
        }
      }
    
      let pr_mw = c.calcPartialMatchWeightFromProbability(prior_probability);
      let po_mw = pr_mw + partial_match_weight;
      let po_prob = c.calcProbabilityFromPartialMatchWeight(po_mw);
    
      let po_prob_fmt = c.roundToSignificantFigures(po_prob, sf);
    
      return md`
    
    The partial match weight of ${pmw_fmt} is equivalent a Bayes Factor of ${bf_fmt}.  
    
    This means after updating the prior, the records are ${formatBayesFactor(
        bayes_factor.value
      )} to be a match.
    
    Our updated (posterior) belief about the probability of a match is ${po_prob_fmt}.
    
    
    `;
    }
  </script>

  <script id="13" type="application/vnd.observable.javascript">
    data_for_chart = {
    function format_to_2sf(num) {
        return parseFloat(num).toFixed(2);
      }
    
      let c = rlju.convertMatchScoreMetrics;
    
      let pr_mw = c.calcPartialMatchWeightFromProbability(prior_probability);
      let po_mw = pr_mw + partial_match_weight;
    
      let pr_bf = c.calcBayesFactorFromPartialMatchWeight(pr_mw);
      let po_bf = c.calcBayesFactorFromPartialMatchWeight(po_mw);
    
      let pr_prob = c.calcProbabilityFromPartialMatchWeight(pr_mw);
      let po_prob = c.calcProbabilityFromPartialMatchWeight(po_mw);
    
      return [
        {
          prior_match_weight: pr_mw,
          posterior_match_weight: po_mw,
          prior_match_weight_fmt: format_to_2sf(pr_mw),
          posterior_match_weight_fmt: format_to_2sf(po_mw),
          prior_bayes_factor_fmt: format_to_2sf(pr_bf),
          posterior_bayes_factor_fmt: format_to_2sf(po_bf),
          prior_prob_fmt: format_to_2sf(pr_prob),
          posterior_prob_fmt: format_to_2sf(po_prob),
          prior_text: "prior",
          posterior_text: "posterior"
        }
      ];
    }
  </script>

  <script id="18" type="application/vnd.observable.javascript">
    set = function set(target, source, transform) {
      let value = get(source);
      if (transform) {
        value = transform(value);
      }
      switch (target.type) {
        case "range":
        case "number":
          target.valueAsNumber = value;
          break;
        case "date":
          target.valueAsDate = value;
          break;
        case "checkbox":
          target.checked = value;
          break;
        case "file":
          target.multiple ? (target.files = value) : (target.files = [value]);
          break;
        default:
          target.value = value;
          break;
      }
    }
  </script>

  <script id="19" type="application/vnd.observable.javascript">
    get = function get(input) {
      switch (input.type) {
        case "range":
        case "number":
          return input.valueAsNumber;
        case "date":
          return input.valueAsDate;
        case "checkbox":
          return input.checked;
        case "file":
          return input.multiple ? input.files : input.files[0];
        default:
          return input.value;
      }
    }
  </script>

  <script id="20" type="application/vnd.observable.javascript">
    bind2 = function bind2(
      target,
      source,
      transform,
      inverseTransform,
      invalidation = disposal(target)
    ) {
      const sourceEvent = eventof(source);
      const onsource = () => set(target, source, transform);
    
      const ontarget = () => {
        set(source, target, inverseTransform);
        source.dispatchEvent(new Event(sourceEvent, { bubbles: true }));
      };
      onsource();
      target.addEventListener(eventof(target), ontarget);
      source.addEventListener(sourceEvent, onsource);
      invalidation.then(() => source.removeEventListener(sourceEvent, onsource));
      return target;
    }
  </script>

  <script id="21" type="application/vnd.observable.javascript">
    eventof = function eventof(input) {
      switch (input.type) {
        case "button":
        case "submit":
          return "click";
        case "file":
          return "change";
        default:
          return "input";
      }
    }
  </script>

  <script id="22" type="application/vnd.observable.javascript">
    disposal = function disposal(element) {
      return new Promise((resolve) => {
        requestAnimationFrame(() => {
          const target = element.closest(".observablehq");
          if (!target) return resolve();
          const observer = new MutationObserver(() => {
            if (target.contains(element)) return;
            observer.disconnect(), resolve();
          });
          observer.observe(target, { childList: true });
        });
      });
    }
  </script>

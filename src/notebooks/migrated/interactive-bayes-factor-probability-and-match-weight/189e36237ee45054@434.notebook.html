        prior_bayes_factor,

      )} \\
      \text{Prior as Match Weight} &= \omega_{\text{prior}} = \log_{2}(K) &= ${roundToSignificantFigures(

        4
      )} \\
      \text{Selected Partial Match Weight} &= v &= ${roundToSignificantFigures(
        selected_val,

      )} \\
      \text{Posterior Match Weight} &= \omega_{\text{posterior}} = \omega_{\text{prior}} + v &= ${roundToSignificantFigures(
        posterior_match_weight,
        4
      )} \\
      \text{Posterior Probability} &= p_{\text{posterior}} = \frac{2^{\omega_{\text{posterior}}}}{1 + 2^{\omega_{\text{posterior}}}} &= ${roundToSignificantFigures(
        posterior_probability,
        4
      )}
      \end{aligned}
    `}`;
    }

  <script id="15" type="application/vnd.observable.javascript">
    calcProbabilityFromPartialMatchWeight = function calcProbabilityFromPartialMatchWeight(selected_val) {

    }

  <script id="16" type="application/vnd.observable.javascript">
    computeProbabilityFromPartialMatchWeight = function computeProbabilityFromPartialMatchWeight(logOdds) {

    }
  </script>

  <script id="17" type="application/vnd.observable.javascript">
    calcPartialMatchWeightFromBayesFactor = function calcPartialMatchWeightFromBayesFactor(K) {
      return Math.log2(K);
    }
  </script>

  <script id="18" type="application/vnd.observable.javascript">
    calcBayesFactorFromProbability = function calcBayesFactorFromProbability(p) {
      return p / (1 - p);
    }
  </script>

  <script id="19" type="application/vnd.observable.javascript">
    roundToSignificantFigures = function roundToSignificantFigures(num, sigFigs) {
      if (num === 0) return 0;
    
      // Calculate the order of magnitude of the number
      const magnitude = Math.floor(Math.log10(Math.abs(num)));
    
      // Calculate the scaling factor
      const scale = Math.pow(10, sigFigs - magnitude - 1);
    
      // Round the number and undo the scaling
      return Math.round(num * scale) / scale;
    }
  </script>

  <script id="24" type="application/vnd.observable.javascript">
    probToBayesFactor = function probToBayesFactor(prob) {
        return prob !== 1 ? prob / (1 - prob) : Infinity;
    }
  </script>

  <script id="25" type="application/vnd.observable.javascript">
    probToMatchWeight = function probToMatchWeight(prob) {
      const bayesFactor = probToBayesFactor(prob);
      const matchWeight = Math.log2(bayesFactor);
    
      // Round to avoid floating point errors
      const precision = 8; // You can adjust the precision as needed
      return (
        Math.round(matchWeight * Math.pow(10, precision)) / Math.pow(10, precision)
      );
    }
  </script>

  <script id="26" type="application/vnd.observable.javascript">
    matchWeightToBayesFactor = function matchWeightToBayesFactor(weight) {
      return Math.pow(2, weight);
    }
  </script>

  <script id="27" type="application/vnd.observable.javascript">
    bayesFactorToProb = function bayesFactorToProb(bf) {
      return bf / (1 + bf);
    }
  </script>

  <script id="28" type="application/vnd.observable.javascript">
    formatBf = function formatBf(bf, mw) {
      if (bf >= 1000) {
        return bf.toLocaleString(undefined, { maximumFractionDigits: 0 });
      } else if (bf >= 100) {
        return bf.toLocaleString(undefined, { maximumFractionDigits: 1 });
      } else if (bf >= 10) {
        return bf.toLocaleString(undefined, { maximumFractionDigits: 2 });
      } else if (bf >= 1) {
        return bf
          .toLocaleString(undefined, { maximumFractionDigits: 3 })
          .replace(/\.?0+$/, "");
      } else {
        // Apply similar formatting logic as prob_fmt for bf < 1
        const absMw = Math.abs(mw);
        const additionalDigits = Math.floor(absMw / 5);
        const minFractionDigits = 4 + additionalDigits;
    
        return bf
          .toLocaleString(undefined, { minimumFractionDigits: minFractionDigits })
          .replace(/\.?0+$/, "");
      }
    }
  </script>

  <script id="29" type="application/vnd.observable.javascript">
    chart_data = {
    const start = -max_match_weight;
      const end = -1 * start;
      const subdivisions = 5;
    
      // Adjust the length to be inclusive of both start and end
      let data = Array.from({ length: (end - start) * subdivisions + 1 }, (_, i) =>
        bayesFactorToProb(
          matchWeightToBayesFactor((i + start * subdivisions) / subdivisions)
        )
      );
    
      data = data.map((x) => ({
        prob: x,
        bf: probToBayesFactor(x),
        mw: probToMatchWeight(x)
      }));
    
      data = data.map((d) => {
        const absMw = Math.abs(d.mw);
        const additionalDigits = Math.floor(absMw / 5);
        const minFractionDigits = 4 + additionalDigits;
    
        const probFmt = d.prob
          .toLocaleString(undefined, { minimumFractionDigits: minFractionDigits })
          .replace(/\.?0+$/, "");
    
        const bfFmt = formatBf(d.bf, d.mw);
        const mwFmt = d.mw.toLocaleString(undefined, { maximumFractionDigits: 1 });
    
        let intFmt;
        if (d.prob > 0.5) {
          const bfValue = d.bf;
          if (bfValue > 100) {
            intFmt = `${bfValue.toLocaleString(undefined, {
              minimumFractionDigits: 0,
              maximumFractionDigits: 0
            })}x more likely`;
          } else {
            intFmt = `${bfValue
              .toLocaleString(undefined, {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
              })
              .replace(/\.?0+$/, "")}x more likely`;
          }
        } else if (d.prob < 0.5) {
          const bfValue = 1 / d.bf;
          if (bfValue > 100) {
            intFmt = `${bfValue.toLocaleString(undefined, {
              minimumFractionDigits: 0,
              maximumFractionDigits: 0
            })}x less likely`;
          } else {
            intFmt = `${bfValue
              .toLocaleString(undefined, {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
              })
              .replace(/\.?0+$/, "")}x less likely`;
          }
        } else {
          intFmt = "no more or less likely";
        }
    
        return {
          ...d,
          prob_fmt: probFmt,
          bf_fmt: bfFmt,
          mw_fmt: mwFmt,
          int_fmt: intFmt
        };
      });
    
      return data; // Return the processed data
    }
  </script>

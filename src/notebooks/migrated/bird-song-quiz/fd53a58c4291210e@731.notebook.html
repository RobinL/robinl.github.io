<!doctype html>
<notebook>
  <title>@robinl/bird-song-quiz: fd53a58c4291210e@731.js</title>

  <script id="1" type="module">
    import {file} from "./146f352f1166f0d1@2202.notebook.html" with {type: "observable"};
  </script>

  <script id="2" type="module">
    import {inaturalist_query} from "./d313b158e2200d6b@274.notebook.html" with {type: "observable"};
  </script>

  <script id="3" type="module">
    import {xeno_canto_query, get_n_from_array_at_random, recording_to_mp3_url, toTitleCase} from "./20eedcbe81e569f0@721.notebook.html" with {type: "observable"};
  </script>

  <script id="4" type="application/vnd.observable.javascript">
    title = md`# UK Birdsong quiz`
  </script>

  <script id="5" type="application/vnd.observable.javascript">
    tag = md`Are you able to identify common UK birds from their song?`
  </script>

  <script id="6" type="application/vnd.observable.javascript">
    settings = md`**Settings:** 
    
    Please select which birds you'd like to include in your quiz:`
  </script>

  <script id="7" type="application/vnd.observable.javascript">
    viewof select_your_quiz = {
    let answer = html`<input id='select-quiz' 
                         type='text'
                         autocomplete='off'
                         inputmode='' 
                         value='20 most common birds'    
                         placeholder="Select which birds to include in quiz..." 
                         style="font-size: 1em; width: 320px" 
                         list=options2>
    
              <datalist id="options2">
                  ${quiz_list_urls.map((d) =>
                    Object.assign(html`<option>`, {
                      value: d["name"]
                    })
                  )}
              </datalist>`;
    
      let upload = html`<input name="file_input" class="inputfile" type="file">`;
    
      let or_blurb = html`<br><span>or upload custom bird list .csv created <a href='https://observablehq.com/@robinl/birdsong-quiz-list-creator'>here:`;
    
      let style = html`<style>
        .inputfile {padding-left: 10px}`;
    
      let div = html`${answer}${or_blurb}${style}${upload}`;
    
      div.value = answer.children[0].value;
    
      answer.onchange = () => {
        upload.value = null;
        div.value = answer.children[0].value;
        div.dispatchEvent(new CustomEvent("input"));
      };
    
      answer.children[0].onfocus = function () {
        answer.children[0].value = "";
      };
    
      answer.children[0].onclick = function () {
        answer.children[0].value = "";
      };
    
      upload.onchange = () => {
        let file = upload.files[0];
    
        let data = file.text();
        div.value = data;
        answer.children[0].value = "Custom upload...";
    
        div.dispatchEvent(new CustomEvent("input"));
      };
    
      return div;
    }
  </script>

  <script id="8" type="application/vnd.observable.javascript">
    quiz = md`**Quiz**`
  </script>

  <script id="9" type="application/vnd.observable.javascript">
    my_interface = {
    let title = md`
      Play the audio clips below, enter your answer and hit submit.
      `;
    
      let audio_controls = get_audio_controls();
    
      let answer = html`<input id='birdinputbox' 
                         name="dep" 
                         type="text"  
                         inputmode='' 
                         value=''    
                         placeholder="Choose your answer from this list..." 
                         style="font-size: 1em; width:${width}px" 
                         list=options>
    
              <datalist id="options">
                  ${quiz_birds.map((d) =>
                    Object.assign(html`<option>`, {
                      label: d["common_name"],
                      value: d["scientific_name"]
                    })
                  )}
              </datalist>`;
    
      let display_clue = html`<input type="button" value="Display clue">`;
      let gallery = get_inaturalist_photos();
    
      let submit = html`<input type="button" value="Submit answer">`;
    
      let results = "";
    
      let your_score = "";
    
      display_clue.onclick = () => {
        document.getElementById("bird_gallery").style.display = "inline-block";
      };
    
      answer.onchange = () => {
        document.getElementById("birdinputbox").setAttribute("inputmode", "none");
      };
      submit.onclick = () => {
        mutable total += 1;
    
        let selected_bird = answer.children[0].value;
        let actual_bird = random_bird.scientific_name;
        let correct = selected_bird == actual_bird;
    
        mutable previous_selection = selected_bird;
        mutable previous_answer = actual_bird;
    
        if (correct) {
          mutable score += 1;
        }
    
        mutable trigger += 1;
    
        document.getElementById("birdinputbox").setAttribute("inputmode", "");
        document.getElementById("bird_gallery").style.display = "none";
      };
    
      if (previous_answer != "") {
        let emoji = "👎";
    
        if (previous_answer == previous_selection) {
          emoji = "✔";
        }
    
        results = md`${emoji} The answer to the previous question was ${
          scientific_name_lookup[previous_answer].common_name
        } (*${previous_answer.toLowerCase()}*).  You chose ${
          scientific_name_lookup[previous_selection].common_name
        }  (*${previous_selection.toLowerCase()}*).`;
      }
    
      your_score = md`You currently have ${score} points out of ${total}`;
    
      return html`${title}
                 ${audio_controls}
                 ${gallery}
                 ${answer}
                 ${submit}
                 ${display_clue}
                  ${results}
                 ${your_score}`;
    }
  </script>

  <script id="10" type="application/vnd.observable.javascript">
    other_link = md`You can find a more comprehensive list of audio recordings for each bird, and photos of them [here](https://robinlinacre.com/birdsong/).`
  </script>

  <script id="11" type="application/vnd.observable.javascript">
    get_audio_controls = function() {
    
    if (results.recordings.length == 0){
      return md`Please wait, loading recordings`
    } else {
      return html`<style>
      .audio_container {display: inline-block;}
      .audio_container div {display: block;  text-align: center}
      </style>
    <div>
      ${random_recordings.map(d => html`<div class='audio_container'><div><a href='${d.url}'>${toTitleCase(d.type)}<div><audio controls><source src='${recording_to_mp3_url(d)}' type='audio/mpeg'>   </audio>`)}`
    }
    
    
    }
  </script>

  <script id="12" type="application/vnd.observable.javascript">
    get_inaturalist_photos = function () {
      let photos_for_clue = get_n_from_array_at_random(inaturalist_pics, 6);
    
      return html`<style> 
    .collection {width: ${width}px; }
    .collection .species { display: inline-block }
    .collection img { display: inline-block; width: 6; height: 6em; object-fit: cover}
    
    </style>
    
    <h2>
    
    <div class="collection" id="bird_gallery" style="display: none" >
    
    ${photos_for_clue.map(
      (s) => `<div class="species">
      <img src="${s.photos[0].url_medium}">
    `
    )}
    </div>
    `;
    }
  </script>

  <script id="13" type="application/vnd.observable.javascript">
    inaturalist_pics = {
    let query = { raw: random_bird["scientific_name"] };
      return inaturalist_query(query);
    }
  </script>

  <script id="14" type="application/vnd.observable.javascript">
    mutable trigger = 0
  </script>

  <script id="15" type="application/vnd.observable.javascript">
    mutable score = 0
  </script>

  <script id="16" type="application/vnd.observable.javascript">
    mutable total = 0
  </script>

  <script id="17" type="application/vnd.observable.javascript">
    mutable previous_answer = ""
  </script>

  <script id="18" type="application/vnd.observable.javascript">
    mutable previous_selection = ""
  </script>

  <script id="19" type="application/vnd.observable.javascript">
    mutable pictures_visibile = false
  </script>

  <script id="20" type="application/vnd.observable.javascript">
    md`
    - Present user with sound clips from a random bird
    - Use can see whether song or call
    - User can select how common
    `
  </script>

  <script id="21" type="application/vnd.observable.javascript">
    bird_list = d3.csv(
      await FileAttachment("british-birds.csv").url(),
      d3.autoType
    ).then(birds => birds.sort(compare_birds_sort))
  </script>

  <script id="22" type="application/vnd.observable.javascript">
    scientific_name_lookup = {
    let lookup = {}
      bird_list.forEach(d => lookup[d.scientific_name] = d)
      return lookup
    }
  </script>

  <script id="23" type="application/vnd.observable.javascript">
    quiz_birds = {
    if (select_your_quiz in quiz_name_to_url_lookup) {
            let attachment = quiz_name_to_url_lookup[select_your_quiz]["attachment"]
            return d3.csv(await attachment.url())
          } else {
            return d3.csvParse(select_your_quiz)
          }
    }
  </script>

  <script id="24" type="application/vnd.observable.javascript">
    compare_birds_sort = function(a,b)  {
        if (a["common_name"] > b["common_name"]) {
        return 1}
        else {
          return -1
        }
      }
  </script>

  <script id="25" type="application/vnd.observable.javascript">
    d3 = require("d3")
  </script>

  <script id="26" type="application/vnd.observable.javascript">
    results = {
    return xeno_canto_query(
        random_bird["scientific_name"],
        "",
        "A",
        "United Kingdom"
      );
    }
  </script>

  <script id="27" type="application/vnd.observable.javascript">
    random_recordings = {
    let len = results.recordings.length
      if (len == 0) {
        return []
      }
      let num_to_get = Math.min(len, 6)
      return get_n_from_array_at_random(results.recordings, num_to_get)
    }
  </script>

  <script id="28" type="application/vnd.observable.javascript">
    random_bird = {
    trigger;
      return get_n_from_array_at_random(quiz_birds, 1)[0]
    }
  </script>

  <script id="29" type="application/vnd.observable.javascript">
    quiz_list_urls = [
      {"name": "10 most common birds", "attachment": FileAttachment("top-10.csv")},
       {"name": "20 most common birds", "attachment": FileAttachment("top-20.csv")},
       {"name": "30 most common birds", "attachment": FileAttachment("top-30.csv")},
       {"name": "40 most common birds", "attachment": FileAttachment("top-40.csv")},
      ]
  </script>

  <script id="30" type="application/vnd.observable.javascript">
    quiz_name_to_url_lookup = {
    let lookup = {}
      quiz_list_urls .forEach(d => lookup[d.name] = d)
      return lookup
    }
  </script>
</notebook>

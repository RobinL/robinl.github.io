<!doctype html>
<notebook>
  <title>@robinl/intro-prob-linkage: 3ec7a740cff5f9ad@84.js</title>

  <script id="1" type="application/vnd.observable.javascript">
    md`# intro prob linkage`
  </script>

  <script id="2" type="application/vnd.observable.javascript">
    input_table = {
    return html`
      <table id="data-table">
        <tr>
          <th>first_name</th>
          <th>surname</th>
          <th>postcode</th>
          <th>gender</th>
        </tr>
        <tr contenteditable>
          <td>Robin</td>
          <td>Linacre</td>
          <td>W1A 1AA</td>
          <td>
            <select>
              <option value="male">Male</option>
              <option value="female" selected>Female</option>
              <option value="other">Non-binary</option>
            </select>
          </td>
        </tr>
        <tr contenteditable>
          <td>Robyn</td>
          <td>Linacre</td>
          <td>W1A 1AA</td>
          <td>
            <select>
              <option value="male" selected>Male</option>
              <option value="female">Female</option>
              <option value="other">Non-binary</option>
            </select>
          </td>
        </tr>
      </table>`;
    }
  </script>

  <script id="3" type="application/vnd.observable.javascript">
    waterfall_chart = {
    let data = rlju.settingsToWaterfall(tutorial_settings, comparison_vector[0]);
    
      let chart_spec = rlju.charts.waterfall_chart(data, false);
    
      return embed(chart_spec);
    }
  </script>

  <script id="4" type="application/vnd.observable.javascript">
    estimated_probability = {
    let data = rlju.settingsToWaterfall(tutorial_settings, comparison_vector[0]);
      let final_score = data.pop();
    
      let match_probability =
        rlju.convertMatchScoreMetrics.calcProbabilityFromPartialMatchWeight(
          final_score.log2_bayes_factor
        );
      match_probability = (match_probability * 100).toFixed(1) + "%";
    
      return html`<div><mark>The estimated probability these two records match is ${match_probability}.</mark></div>`;
    }
  </script>

  <script id="5" type="application/vnd.observable.javascript">
    rlju.convertMatchScoreMetrics.calcPartialMatchWeightFromProbability(1 / 10e6)
  </script>

  <script id="6" type="application/vnd.observable.javascript">
    rlju.convertMatchScoreMetrics.calcProbabilityFromPartialMatchWeight(6)
  </script>

  <script id="7" type="application/vnd.observable.javascript">
    tutorial_settings = rlju.tutorial_partial_match_weights_settings
  </script>

  <script id="8" type="application/vnd.observable.javascript">
    partial_match_weight_chart_data_raw = rlju.settingsToPartialMatchWeightsData(
      tutorial_settings
    )
  </script>

  <script id="9" type="application/vnd.observable.javascript">
    partial_match_weight_chart_data_raw_with_barisactive = rlju.setBarIsActive(
      partial_match_weight_chart_data_raw,
      comparison_vector[0]
    )
  </script>

  <script id="10" type="application/vnd.observable.javascript">
    comparison_vector = rlju.applyComparisonFunctions(
      comparison_pairs,
      comparison_functions
    )
  </script>

  <script id="11" type="application/vnd.observable.javascript">
    comparison_pairs = rlju.createComparisonRows(tableData)
  </script>

  <script id="12" type="application/vnd.observable.javascript">
    tableData = Generators.observe((notify) => {
      const keyinput = (event) => notify(rlju.parseTableData(input_table));
      input_table.addEventListener("input", keyinput, false);
      notify(rlju.parseTableData(input_table));
      return () => window.removeEventListener("input", keyinput);
    })
  </script>

  <script id="13" type="application/vnd.observable.javascript">
    comparison_functions = {
    return {
        first_name: rlju.jaroWinklerComparison,
        surname: rlju.jaroWinklerComparison,
        postcode: rlju.levenshteinComparison,
        gender: rlju.exactMatchComparison
      };
    }
  </script>

  <script id="14" type="application/vnd.observable.javascript">
    embed = require("vega-embed@6")
  </script>

  <script id="17" type="application/vnd.observable.javascript">
    rlju = require("@robinl/record_linkage_javascript_utilities@0.0.7")
  </script>

  <script id="18" type="application/vnd.observable.javascript">
    viewof refresh = Inputs.button("refresh splink_vis_utils javascript lib")
  </script>
</notebook>

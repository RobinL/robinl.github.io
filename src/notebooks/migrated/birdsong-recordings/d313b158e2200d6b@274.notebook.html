  <script id="2" type="application/vnd.observable.javascript">
    call_api = function call_api(taxon_name='', inaturalist_id=null) {
      let endpoint = 'https://api.inaturalist.org/v1/observations'
      
      
      let params = {
        photos: true,
        verifiable:true,
        order_by: "votes",
        lat:53.807321,
        lng:-1.387255,
        radius:1400
      }
      
      if (inaturalist_id !== null) {
        params["taxon_id"] = inaturalist_id
      } else {
        params["taxon_name"] = taxon_name
      }
      
      params = Object.entries(params).map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
      
      return endpoint + "?" + params
    
    }
  </script>

  <script id="3" type="application/vnd.observable.javascript">
    inaturalist_query = function *inaturalist_query(bird) {
     
     yield []
      
     if (bird.raw == '') {
     yield []
     } else {
      
     let url
     if ('inaturalist_id' in bird) {
         url = call_api(bird.raw, bird.inaturalist_id)
       } else {
         url = call_api(bird.raw)
       }
     
     yield fetch(url).then(d=>d.json()).then((d) => {
       
       d.results.forEach(r => r.photos.forEach(p => {p.url_medium = p.url.replace("square", "medium");
                                                     p.url_large = p.url.replace("square", "original")}))
       
       let results = d.results
       
       results.sort((a,b) => { a.faves_count-b.faves_count})
       
      
       return results 
     })
     }
                                              
                                              
    }
  </script>

  <script id="4" type="application/vnd.observable.javascript">
    getRandomInt = function getRandomInt(min, max) {
        min = Math.ceil(min);
        max = Math.floor(max);
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
  </script>

  <script id="5" type="application/vnd.observable.javascript">
    get_random_inat_from_results = function get_random_inat_from_results(results) {
    
     
      let num_results = results.results.length
      
      if (num_results == 0) {
        return
      }
      
      let result_num = getRandomInt(0, num_results)
      
      return results.results[result_num]
      
    }
  </script>

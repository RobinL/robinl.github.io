  <script id="11" type="application/vnd.observable.javascript">
    slider = function slider(config = {}) {
      let {
        min = 0, max = 1, value = (max + min) / 2, step = "any", precision = 2,
        title, description, getValue, format, display, submit,
      } = typeof config === "number" ? {value: config} : config;
      precision = Math.pow(10, precision);
      if (!getValue) getValue = input => Math.round(input.valueAsNumber * precision) / precision;
      return input({
        type: "range", title, description, submit, format, display,
        attributes: {min, max, step, value},
        getValue
      });
    }
  </script>

  <script id="27" type="application/vnd.observable.javascript">
    select = function select(config = {}) {
      let {
        value: formValue,
        title,
        description,
        submit,
        multiple,
        size,
        options
      } = Array.isArray(config) ? {options: config} : config;
      options = options.map(
        o => (typeof o === "object" ? o : { value: o, label: o })
      );
      const form = input({
        type: "select",
        title,
        description,
        submit,
        getValue: input => {
          const selected = Array.prototype.filter
            .call(input.options, i => i.selected)
            .map(i => i.value);
          return multiple ? selected : selected[0];
        },
        form: html`
          <form>
            <select name="input" ${
              multiple ? `multiple size="${size || options.length}"` : ""
            }>
              ${options.map(({ value, label }) => Object.assign(html`<option>`, {
                  value,
                  selected: Array.isArray(formValue)
                    ? formValue.includes(value)
                    : formValue === value,
                  textContent: label
                }))}
            </select>
          </form>
        `
      });
      form.output.remove();
      return form;
    }
  </script>

  <script id="31" type="application/vnd.observable.javascript">
    autoSelect = function autoSelect(config = {}) {
      const {
        value,
        title,
        description,
        autocomplete = "off",
        placeholder,
        size,
        options,
        list = "options"
      } = Array.isArray(config) ? {options: config} : config;
    
      const optionsSet = new Set(options);
    
      const form = input({
        type: "text",
        title,
        description,
        action: fm => {
          fm.value = fm.input.value = value || "";
          fm.onsubmit = e => e.preventDefault();
          fm.input.oninput = function(e) {
            e.stopPropagation();
            fm.value = fm.input.value;
            if (optionsSet.has(fm.input.value))
              fm.dispatchEvent(new CustomEvent("input"));
          };
        },
        form: html`
          <form>
             <input name="input" type="text" autocomplete="off" 
              placeholder="${placeholder}" style="font-size: 1em;" list=${list}>
              <datalist id="${list}">
                  ${options.map(d =>
                    Object.assign(html`<option>`, {
                      value: d
                    })
                  )}
              </datalist>
          </form>
          `
      });
    
      form.output.remove();
      return form;
    }
  </script>

  <script id="45" type="application/vnd.observable.javascript">
    worldMapCoordinates = function worldMapCoordinates(config = {}) {
      const {
        value = [], title, description, width = 400
      } = Array.isArray(config) ? {value: config} : config;
      const height = Math.round((210 / 400) * width);
      let [lon, lat] = value;
      lon = lon != null ? lon : null;
      lat = lat != null ? lat : null;
      const formEl = html`<form style="width: ${width}px;"></form>`;
      const context = DOM.context2d(width, height);
      const canvas = context.canvas;
      canvas.style.margin = "10px 0 0";
      const projection = d3geo
        .geoNaturalEarth1()
        .precision(0.1)
        .fitSize([width, height], { type: "Sphere" });
      const path = d3geo.geoPath(projection, context).pointRadius(2.5);
      formEl.append(canvas);
    
      function draw() {
        context.fillStyle = "#fff";
        context.fillRect(0, 0, width, height);
        context.beginPath();
        path(graticule);
        context.lineWidth = 0.35;
        context.strokeStyle = `#ddd`;
        context.stroke();
        context.beginPath();
        path(land);
        context.fillStyle = `#f4f4f4`;
        context.fill();
        context.beginPath();
        path(countries);
        context.strokeStyle = `#aaa`;
        context.stroke();
        if (lon != null && lat != null) {
          const pointPath = { type: "MultiPoint", coordinates: [[lon, lat]] };
          context.beginPath();
          path(pointPath);
          context.fillStyle = `#f00`;
          context.fill();
        }
      }
    
      canvas.onclick = function(ev) {
        const { offsetX, offsetY } = ev;
        var coords = projection.invert([offsetX, offsetY]);
        lon = +coords[0].toFixed(2);
        lat = +coords[1].toFixed(2);
        draw();
        canvas.dispatchEvent(new CustomEvent("input", { bubbles: true }));
      };
    
      draw();
    
      const form = input({
        type: "worldMapCoordinates",
        title,
        description,
        display: v =>
          html`<div style="position: absolute; width: ${width}px; white-space: nowrap; color: #444; text-align: center; font: 13px sans-serif; margin-top: -18px;">
                <span style="color: #777;">Longitude:</span> ${lon != null ? lon : ""}
                &nbsp; &nbsp; 
                <span style="color: #777;">Latitude:</span> ${lat != null ? lat : ""} 
              </div>`,
        getValue: () => [lon != null ? lon : null, lat != null ? lat : null],
        form: formEl
      });
      return form;
    }
  </script>

  <script id="51" type="application/vnd.observable.javascript">
    usaMapCoordinates = function usaMapCoordinates(config = {}) {
      const {
        value = [], title, description, width = 400
      } = Array.isArray(config) ? {value: config} : config;
      const scale = width / 960;
      const height = scale * 600;
      let [lon, lat] = value;
      lon = lon != null ? lon : null;
      lat = lat != null ? lat : null;
      const formEl = html`<form style="width: ${width}px;"></form>`;
      const context = DOM.context2d(width, height);
      const canvas = context.canvas;
      canvas.style.margin = "5px 0 0";
      const projection = d3geo
        .geoAlbersUsa()
        .scale(1280)
        .translate([480, 300]);
      const path = d3geo
        .geoPath()
        .context(context)
        .pointRadius(2.5 / scale);
      formEl.append(canvas);
    
      function draw() {
        context.clearRect(0, 0, width, height);
        context.save();
        context.scale(scale, scale);
        context.lineWidth = 0.35 / scale;
        context.beginPath();
        path(nation);
        context.fillStyle = `#f4f4f4`;
        context.fill();
        context.beginPath();
        path(states);
        context.strokeStyle = `#aaa`;
        context.stroke();
        if (lon != null && lat != null) {
          const pointPath = {
            type: "MultiPoint",
            coordinates: [projection([lon, lat])]
          };
          context.beginPath();
          path(pointPath);
          context.fillStyle = `#f00`;
          context.fill();
        }
        context.restore();
      }
    
      canvas.onclick = function(ev) {
        const { offsetX, offsetY } = ev;
        var coords = projection.invert([offsetX / scale, offsetY / scale]);
        lon = +coords[0].toFixed(2);
        lat = +coords[1].toFixed(2);
        draw();
        canvas.dispatchEvent(new CustomEvent("input", { bubbles: true }));
      };
    
      draw();
    
      const form = input({
        type: "worldMapCoordinates",
        title,
        description,
        display: v =>
          html`<div style="position: absolute; width: ${width}px; white-space: nowrap; color: #444; text-align: center; font: 13px sans-serif; margin-top: -18px;">
                <span style="color: #777;">Longitude:</span> ${lon != null ? lon : ""}
                &nbsp; &nbsp; 
                <span style="color: #777;">Latitude:</span> ${lat != null ? lat : ""} 
              </div>`,
        getValue: () => [lon != null ? lon : null, lat != null ? lat : null],
        form: formEl
      });
      return form;
    }
  </script>

    radio = function radio(config = {}) {
      let {
        value: formValue, title, description, submit, options
      } = Array.isArray(config) ? {options: config} : config;
      options = options.map(o =>
        typeof o === "string" ? { value: o, label: o } : o
      );
      const form = input({
        type: "radio",
        title,
        description,
        submit,
        getValue: input => {

          const checked = Array.prototype.find.call(input, radio => radio.checked);
          return checked ? checked.value : undefined;
        },
        form: html`
          <form>
            ${options.map(({ value, label }) => {
              const input = html`<input type=radio name=input ${
                value === formValue ? "checked" : ""
              } style="vertical-align: baseline;" />`;
              input.setAttribute("value", value);
              const tag = html`
              <label style="display: inline-block; margin: 5px 10px 3px 0; font-size: 0.85em;">
               ${input}
               ${label}
              </label>`;
              return tag;
            })}
          </form>
        `
      });
      form.output.remove();
      return form;
    }
  </script>

  <script id="107" type="application/vnd.observable.javascript">
    input = function input(config) {
      let {
        form,
        type = "text",
        attributes = {},
        action,
        getValue,
        title,
        description,
        format,
        display,
        submit,
        options
      } = config;
      const wrapper = html`<div></div>`;
      if (!form)
        form = html`<form>
    	<input name=input type=${type} />
      </form>`;
      Object.keys(attributes).forEach(key => {
        const val = attributes[key];
        if (val != null) form.input.setAttribute(key, val);
      });
      if (submit)
        form.append(
          html`<input name=submit type=submit style="margin: 0 0.75em" value="${
            typeof submit == "string" ? submit : "Submit"
          }" />`
        );
      form.append(
        html`<output name=output style="font: 14px Menlo, Consolas, monospace; margin-left: 0.5em;"></output>`
      );
      if (title)
        form.prepend(
          html`<div style="font: 700 0.9rem sans-serif;">${title}</div>`
        );
      if (description)
        form.append(
          html`<div style="font-size: 0.85rem; font-style: italic;">${description}</div>`
        );
      if (format) format = typeof format === "function" ? format : d3format.format(format);
      if (action) {
        action(form);
      } else {
        const verb = submit
          ? "onsubmit"
          : type == "button"
          ? "onclick"
          : type == "checkbox" || type == "radio"
          ? "onchange"
          : "oninput";
        form[verb] = e => {
          e && e.preventDefault();
          const value = getValue ? getValue(form.input) : form.input.value;
          if (form.output) {
            const out = display ? display(value) : format ? format(value) : value;
            if (out instanceof window.Element) {
              while (form.output.hasChildNodes()) {
                form.output.removeChild(form.output.lastChild);
              }
              form.output.append(out);
            } else {
              form.output.value = out;
            }
          }
          form.value = value;
          if (verb !== "oninput")
            form.dispatchEvent(new CustomEvent("input", { bubbles: true }));
        };
        if (verb !== "oninput")
          wrapper.oninput = e => e && e.stopPropagation() && e.preventDefault();
        if (verb !== "onsubmit") form.onsubmit = e => e && e.preventDefault();
        form[verb]();
      }
      while (form.childNodes.length) {
        wrapper.appendChild(form.childNodes[0]);
      }
      form.append(wrapper);
      return form;
    }
  </script>

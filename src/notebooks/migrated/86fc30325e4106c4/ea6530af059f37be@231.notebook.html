  <script id="14" type="application/vnd.observable.javascript">
    parseTableData = function parseTableData(table) {
      const data = [];
    
      const replace_lookup = {
        "unique id": "uid",
        "first name": "fname",
        surname: "sname",
        "date of birth": "dob",
        town: "town"
      };
    
      table.querySelectorAll("tr").forEach((row, i) => {
        let cells = row.cells;
        let row_data = [];
    
        for (let cell of cells) {
          let value = cell.innerText;
          value = value.trim();
          value = value.toLowerCase();
          if (value == "") {
            value = null;
          }
          row_data.push(value);
        }
        data.push(row_data);
      });
    
      const formattedData = data.reduce((accumulator, row, i) => {
        if (i == 0) {
          row = row.map((d) => replace_lookup[d]);
          accumulator.properties = row;
        } else {
          const rowObject = {};
    
          accumulator.properties.forEach((key, i) => {
            rowObject[key] = row[i];
          });
          accumulator.push(rowObject);
        }
        return accumulator;
      }, []);
      return formattedData;
    }
  </script>
